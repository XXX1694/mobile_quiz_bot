name: Send Daily Quiz

on:
  schedule:
    # Время в UTC! (Алматы +5, значит 11:00 — это 06:00 UTC)
    - cron: '0 6 * * *'  # 11:00 по Алматы
    - cron: '0 9 * * *'  # 14:00 по Алматы
    - cron: '0 12 * * *' # 17:00 по Алматы
  workflow_dispatch: # Позволяет запустить вручную для теста

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install aiogram

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # Логика выбора тега в зависимости от часа
          HOUR=$(date +%H)
          if [ "$HOUR" == "06" ]; then TAG="Swift";
          elif [ "$HOUR" == "09" ]; then TAG="Kotlin";
          else TAG="Flutter"; fi
          python bot.py $TAG