name: Send Daily Quiz

on:
  schedule:
    # Время в UTC (Алматы -5 часов)
    # 11:13 по Алматы (06:13 UTC)
    - cron: '13 6 * * *'
    # 14:27 по Алматы (09:27 UTC)
    - cron: '27 9 * * *'
    # 17:42 по Алматы (12:42 UTC)
    - cron: '42 12 * * *'
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: quiz-state
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install aiogram

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          H=$(date -u +%H)
          echo "Current UTC hour: $H"

          # Логика выбора тега по интервалам (UTC):
          if [ "$H" -ge 5 ] && [ "$H" -lt 9 ]; then
            TAG="Swift"
          elif [ "$H" -ge 9 ] && [ "$H" -lt 12 ]; then
            TAG="Kotlin"
          elif [ "$H" -ge 12 ] && [ "$H" -lt 16 ]; then
            TAG="Flutter"
          else
            TAG="Flutter"
          fi

          echo "Selected TAG: $TAG"
          python bot.py $TAG

      - name: Commit updated state
        run: |
          git config user.name "quiz-bot"
          git config user.email "quiz-bot@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "chore: update quiz state"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME:-main}
            git push origin HEAD:${GITHUB_REF_NAME:-main}
          fi
